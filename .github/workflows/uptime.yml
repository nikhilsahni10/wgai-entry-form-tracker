name: Check Public Tracker Uptime

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TRACKER_URL: ${{ vars.TRACKER_URL }}

    steps:
      - name: Check tracker API
        run: |
          set -u

          tracker_url="${TRACKER_URL:-https://wgai-monitor.vercel.app}"
          tracker_url="${tracker_url%/}"
          api_url="${tracker_url}/api/check"
          response_file="$(mktemp)"
          error_file="$(mktemp)"

          if ! curl -fsS --max-time 30 "$api_url" -o "$response_file" 2>"$error_file"; then
            reason="$(cat "$error_file")"
            echo "$reason" >&2
            exit 1
          fi

          if ! python3 - "$response_file" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          with open(path, "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          if not payload.get("ok"):
              raise SystemExit(payload.get("error") or f"Unexpected payload: {payload}")

          if not payload.get("current_text"):
              raise SystemExit(f"Missing current_text in payload: {payload}")

          if payload.get("live") is False or payload.get("status") == "source_unavailable":
              raise SystemExit(payload.get("error") or "Tracker returned only recorded data.")

          print(payload["current_text"])
          PY
          then
            reason="Tracker API returned invalid JSON or an unhealthy payload."
            echo "$reason" >&2
            cat "$response_file" >&2
            exit 1
          fi
