name: Monitor WGAI Entry Form

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wgai-entry-form-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run hosted monitor
        id: monitor
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 scripts/monitor_once.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .state data
          git diff --cached --quiet && exit 0
          git commit -m "Record WGAI check at $(TZ=Asia/Kolkata date '+%Y-%m-%d %H:%M:%S IST')"
          git push

      - name: Fail workflow if monitor run failed
        if: steps.monitor.outcome != 'success'
        run: exit 1
