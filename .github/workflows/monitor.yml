name: Monitor WGAI Entry Form

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wgai-entry-form-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch live status
        id: live
        run: |
          curl -fsS "https://wgai-monitor.vercel.app/api/check" -o status.json
          python3 - <<'PY'
          import json
          import os

          with open("status.json", "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          current_text = payload.get("current_text", "").strip()
          status = payload.get("status", "unknown")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"status={status}\n")
              out.write("current_text<<EOF\n")
              out.write(current_text + "\n")
              out.write("EOF\n")
          PY

      - name: Update tracked state and check history
        id: state
        run: |
          mkdir -p .state data
          python3 - <<'PY'
          import csv
          import os
          from datetime import datetime, timedelta, timezone

          current_text = os.environ["CURRENT_TEXT"].strip()
          status = os.environ["LIVE_STATUS"].strip()
          state_path = ".state/last_text.txt"
          history_path = "data/check_history.csv"

          ist = timezone(timedelta(hours=5, minutes=30))
          timestamp = datetime.now(timezone.utc).astimezone(ist).strftime(
              "%Y-%m-%d %H:%M:%S IST"
          )

          previous_text = ""
          initialized = not os.path.exists(state_path)
          if not initialized:
              with open(state_path, "r", encoding="utf-8") as fh:
                  previous_text = fh.read().strip()

          changed = (not initialized) and current_text != previous_text

          with open(state_path, "w", encoding="utf-8") as fh:
              fh.write(current_text)

          history_exists = os.path.exists(history_path)
          with open(history_path, "a", encoding="utf-8", newline="") as fh:
              writer = csv.DictWriter(
                  fh,
                  fieldnames=["timestamp", "status", "changed", "current_text"],
              )
              if not history_exists:
                  writer.writeheader()
              writer.writerow(
                  {
                      "timestamp": timestamp,
                      "status": status,
                      "changed": "true" if changed else "false",
                      "current_text": current_text,
                  }
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"changed={'true' if changed else 'false'}\n")
              out.write(f"initialized={'true' if initialized else 'false'}\n")
              out.write("previous_text<<EOF\n")
              out.write(previous_text + "\n")
              out.write("EOF\n")
              out.write("timestamp<<EOF\n")
              out.write(timestamp + "\n")
              out.write("EOF\n")
          PY
        env:
          CURRENT_TEXT: ${{ steps.live.outputs.current_text }}
          LIVE_STATUS: ${{ steps.live.outputs.status }}

      - name: Send Telegram alert
        if: steps.state.outputs.changed == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OLD_TEXT: ${{ steps.state.outputs.previous_text }}
          NEW_TEXT: ${{ steps.live.outputs.current_text }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_TOKEN"]
          chat_id = os.environ["CHAT_ID"]
          old_text = os.environ["OLD_TEXT"]
          new_text = os.environ["NEW_TEXT"]
          message = (
              "WGAI text changed.\n\n"
              f"Old text:\n{old_text}\n\n"
              f"New text:\n{new_text}\n\n"
              "Tracker:\nhttps://wgai-monitor.vercel.app/"
          )
          data = urllib.parse.urlencode(
              {"chat_id": chat_id, "text": message}
          ).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=data,
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              if response.status != 200:
                  raise SystemExit(f"Telegram send failed with status {response.status}")
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/last_text.txt data/check_history.csv
          git commit -m "Record WGAI check at ${{ steps.state.outputs.timestamp }}" || exit 0
          git push
